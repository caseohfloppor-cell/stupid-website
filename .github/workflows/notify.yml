name: Get Gyro Data

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  gyro:
    runs-on: self-hosted
    steps:
      - name: Pull gyro data
        shell: cmd
        run: |
          C:\Users\darkg\Downloads\platform-tools-latest-windows\platform-tools\adb.exe shell dumpsys sensorservice > gyro_raw.txt
          type gyro_raw.txt

      - name: Push gyro data back to repo
        shell: cmd
        run: |
          git config --global user.email "bot@claude.ai"
          git config --global user.name "Claude"
          git fetch origin
          git checkout main
          copy gyro_raw.txt gyro_data.txt
          git add gyro_data.txt
          git commit -m "gyro data dump"
          git push origin main
