name: Send Phone Notification

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: self-hosted
    steps:
      - name: Debug environment
        run: |
          echo "PATH: $env:PATH"
          where.exe adb
          
      - name: Check ADB devices
        run: |
          C:\adb\adb.exe devices
          
      - name: Send Notification
        run: |
          C:\adb\adb.exe shell cmd notification post -S bigtext -t "🔥 GitHub Says Hi" "ClaudeNotif" "Claude just hacked your phone lmao"
