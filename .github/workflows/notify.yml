name: Send Phone Notification

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: self-hosted
    steps:
      - name: Check ADB devices
        run: |
          C:\Users\darkg\Downloads\platform-tools-latest-windows\platform-tools\adb.exe devices

      - name: Send Notification
        run: |
          C:\Users\darkg\Downloads\platform-tools-latest-windows\platform-tools\adb.exe shell cmd notification post -S bigtext -t "GitHub Says Hi" "ClaudeNotif" "Claude just hacked your phone lmao"
