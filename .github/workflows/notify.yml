name: Get Gyro Data

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  gyro:
    runs-on: self-hosted
    steps:
      - name: Read and send gyro data
        shell: powershell
        run: |
          $adb = "C:\Users\darkg\Downloads\platform-tools-latest-windows\platform-tools\adb.exe"
          $data = & $adb shell dumpsys sensorservice
          $gyroLine = $data | Select-String -Pattern "Gyro|gyro|GYRO" | Select-Object -First 3
          Write-Output $gyroLine
          
          # Also get orientation
          $orient = & $adb shell dumpsys display | Select-String -Pattern "mCurrentOrientation|orientation"
          Write-Output $orient

          # Send as notification
          $gyroText = $gyroLine -join " | "
          & $adb shell cmd notification post -S bigtext -t "Gyro Data" "ClaudeNotif" "$gyroText"
