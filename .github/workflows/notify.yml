name: SSH into Phone

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ssh:
    runs-on: self-hosted
    steps:
      - name: SSH into phone and run commands
        shell: powershell
        run: |
          $password = "claude"
          $ip = "10.0.4.38"
          $port = "8022"
          $user = "u0_a427"
          
          # Install sshpass equivalent for windows via plink (putty)
          # Use plink if available, otherwise use ssh with password via expect
          choco install putty -y 2>$null
          
          $cmd = "uname -a && whoami && pwd && ls && cat /proc/cpuinfo | grep 'Hardware' | head -1"
          
          echo "y" | & "C:\Program Files\PuTTY\plink.exe" -pw $password -P $port "$user@$ip" $cmd
