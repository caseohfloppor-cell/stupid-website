name: SSH into Phone

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ssh:
    runs-on: self-hosted
    steps:
      - name: SSH into phone
        shell: powershell
        run: |
          $ip = "10.0.4.38"
          $port = "8022"
          $user = "u0_a427"
          $password = "claude"
          $cmd = "uname -a && whoami && df -h && cat /proc/cpuinfo | grep Hardware | head -1"

          # Use built-in Windows SSH with sshpass workaround via net use
          # Write expect-like script
          $sshCommand = "ssh -o StrictHostKeyChecking=no -o PasswordAuthentication=yes -p $port $user@$ip `"$cmd`""
          
          # Use plink download directly
          Invoke-WebRequest -Uri "https://the.earth.li/~sgtatham/putty/latest/w64/plink.exe" -OutFile "plink.exe"
          
          # Accept host key and run command
          cmd /c "echo y | plink.exe -pw $password -P $port $user@$ip $cmd"
