name: SSH into Phone

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ssh:
    runs-on: self-hosted
    timeout-minutes: 2
    steps:
      - name: Download plink with timeout
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://the.earth.li/~sgtatham/putty/latest/w64/plink.exe" -OutFile "plink.exe" -TimeoutSec 30
          Write-Output "plink downloaded!"
          .\plink.exe -V

      - name: SSH into phone
        shell: cmd
        run: |
          echo y | plink.exe -pw claude -P 8022 -batch u0_a427@10.0.4.38 "uname -a && whoami && pwd"
